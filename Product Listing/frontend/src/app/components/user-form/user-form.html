<div class="form-container">
  <h2>{{ isEditMode ? 'Edit User' : 'Add New User' }}</h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="name" placeholder="John Doe">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="john@example.com">
    </div>

    <div class="form-group">
      <label>Role</label>
      <input type="text" formControlName="role" placeholder="Software Engineer">
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea formControlName="bio" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Skills (comma separated)</label>
      <input type="text" formControlName="skills" placeholder="Angular, Node.js, MongoDB">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="userForm.invalid" class="btn-save">Save User</button>
      <a routerLink="/" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
